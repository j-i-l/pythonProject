name: Build and Push Container

on:
  push:
    branches: [main]
    tags:
      - '*' # Triggers on any tag

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Convert the repository name to lowercase for Docker compatibility
      - name: Lowercase repository name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # 2. Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the branch name (e.g., 'main') if triggered by a branch push
            type=ref,event=branch
            # Tag with the git tag (e.g., '1.0.0') if triggered by a tag push
            type=ref,event=tag
            # Automatically tag as 'latest' ONLY if pushing to the default branch (usually main/master)
            type=raw,value=latest,enable={{is_default_branch}}

      # 3. Log in to GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
