name: Build Apptainer Container

on:
  push:
    branches: [main]
    tags:
      - '*'

env:
  REGISTRY: ghcr.io

jobs:
  build-apptainer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to read the full git history for versioning

      - name: Lowercase repository name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Extract metadata to ensure version parity
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-sif
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.1

      # --- NEW STEP: Extract dynamic version on the host ---
      - name: Extract dynamic version
        run: |
          # pipx is pre-installed on GitHub Ubuntu runners. 
          # It safely runs python CLI tools without polluting the system environment.
          pipx install setuptools-scm
          
          # Extract the version and save it to the GitHub environment variables
          COMPUTED_VERSION=$(setuptools-scm)
          echo "PKG_VERSION=$COMPUTED_VERSION" >> $GITHUB_ENV
          echo "Extracted Version: $COMPUTED_VERSION"

      # --- UPDATED STEP: Pass the version as a build argument ---
      - name: Build Apptainer image
        run: |
          sudo apptainer build --build-arg VERSION="${PKG_VERSION}" say_hello.sif containers/say_hello.def

      - name: Push Apptainer image to GHCR
        run: |
          PRIMARY_TAG=${{ steps.meta.outputs.version }}
          APPTAINER_URI="oras://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-sif:${PRIMARY_TAG}"

          echo "Authenticating Apptainer to GHCR..."
          echo "${{ secrets.GITHUB_TOKEN }}" | apptainer remote login -u ${{ github.actor }} --password-stdin oras://${{ env.REGISTRY }}

          echo "Pushing Apptainer image to ${APPTAINER_URI}..."
          apptainer push say_hello.sif ${APPTAINER_URI}
