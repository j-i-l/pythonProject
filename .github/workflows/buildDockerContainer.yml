name: Build Docker Container

on:
  push:
    branches: [main]
    tags:
      - '*' # Triggers on any tag

env:
  REGISTRY: ghcr.io

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by setuptools-scm to read the full git history for versioning

      # 1. Convert the repository name to lowercase for Docker compatibility
      - name: Lowercase repository name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # 2. Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      # 3. Allow .git in build context for versioning
      # setuptools-scm requires the .git folder to dynamically determine the package version.
      # This removes .git/ from .dockerignore so it successfully copies into the container.
      - name: Fix .dockerignore for setuptools-scm
        run: |
          if [ -f .dockerignore ]; then
            sed -i '/^\.git\//d' .dockerignore
            sed -i '/^\.git$/d' .dockerignore
          fi

      # 4. Log in to GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/say_hello.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
